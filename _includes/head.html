<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">
{% endif %}{% if page.robots %}<meta name="robots" content="{{ page.robots }}">
{% endif %}<meta property="og:title" content="{{ page.og_title | default: page.title | default: site.title }}">
<meta property="og:description" content="{{ page.og_description | default: page.description | default: site.description }}">
{% if page.image %}<meta property="og:image" content="{{ page.image }}">
{% endif %}{% if page.og_url %}<meta property="og:url" content="{{ page.og_url }}">
{% endif %}<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.twitter_title | default: page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.twitter_description | default: page.description | default: site.description }}">
{% if page.image %}<meta name="twitter:image" content="{{ page.image }}">
{% endif %}{% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}">
{% endif %}<link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
<link rel="shortcut icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" type="image/png" href="{{ '/assets/images/cafecito.png' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/common.css' | relative_url }}">
{% if page.page_css %}<link rel="stylesheet" href="{{ page.page_css | relative_url }}">
{% endif %}
